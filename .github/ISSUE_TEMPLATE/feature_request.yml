name: Feature Request
description: Propose a new command, flag, or behavior.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you accomplish today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        Sketch the CLI surface, e.g.
        `keygen license export <id> --format jwt`

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New resource
        - New action on existing resource
        - Output formatting
        - TUI
        - AI / schema integration
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
