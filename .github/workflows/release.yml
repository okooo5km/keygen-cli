name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test
        run: cargo test

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/keygen \
            target/x86_64-apple-darwin/release/keygen \
            -output keygen

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf keygen-cli_${VERSION}_darwin_universal.tar.gz keygen
          shasum -a 256 keygen-cli_${VERSION}_darwin_universal.tar.gz > keygen-cli_${VERSION}_darwin_universal.tar.gz.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: keygen-cli_*.tar.gz*

  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf keygen-cli_${VERSION}_linux_x86_64.tar.gz -C target/release keygen
          sha256sum keygen-cli_${VERSION}_linux_x86_64.tar.gz > keygen-cli_${VERSION}_linux_x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: keygen-cli_*.tar.gz*

  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf keygen-cli_${VERSION}_linux_arm64.tar.gz -C target/release keygen
          sha256sum keygen-cli_${VERSION}_linux_arm64.tar.gz > keygen-cli_${VERSION}_linux_arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: keygen-cli_*.tar.gz*

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          7z a keygen-cli_${VERSION}_windows_x86_64.zip ./target/release/keygen.exe
          sha256sum keygen-cli_${VERSION}_windows_x86_64.zip > keygen-cli_${VERSION}_windows_x86_64.zip.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: keygen-cli_*.zip*

  release:
    name: Create Release
    needs: [build-macos, build-linux-x86_64, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Build changelog from commits
        id: changelog
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)

          {
            echo "## What's changed"
            echo
            if [ -z "$PREV" ]; then
              git log --pretty=format:"- %s (%h)" "$TAG"
            else
              git log --pretty=format:"- %s (%h)" "${PREV}..${TAG}"
            fi
            echo
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "brew install okooo5km/tap/keygen-cli"
            echo '```'
            echo
            if [ -n "$PREV" ]; then
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            fi
          } > changelog.md
          echo "Generated changelog:"
          cat changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file changelog.md \
            keygen-cli_*

  homebrew:
    name: Update Homebrew Tap
    needs: [release]
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: macos-universal

      - name: Update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA256=$(cat keygen-cli_${VERSION}_darwin_universal.tar.gz.sha256 | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/okooo5km/homebrew-tap.git" homebrew-tap

          DOWNLOAD_URL="https://github.com/okooo5km/keygen-cli/releases/download/v${VERSION}/keygen-cli_${VERSION}_darwin_universal.tar.gz"

          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/keygen-cli.rb << FORMULA
          class KeygenCli < Formula
            desc "AI-friendly CLI for keygen.sh — manage products, policies, licenses, machines, releases"
            homepage "https://github.com/okooo5km/keygen-cli"
            url "${DOWNLOAD_URL}"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "MIT"

            def install
              bin.install "keygen"
              bin.install_symlink bin/"keygen" => "kg"
            end

            def caveats
              <<~EOS
                Run \`keygen login\` to authenticate, or set KEYGEN_TOKEN.
                Short alias: \`kg\` (symlink to \`keygen\`).
                Shell completion: \`keygen completion zsh > ~/.zfunc/_keygen\`
              EOS
            end

            test do
              assert_match "keygen", shell_output("#{bin}/keygen --version")
              assert_match "keygen", shell_output("#{bin}/kg --version")
            end
          end
          FORMULA

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "keygen-cli ${VERSION}"
          git push
